version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: markwise
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d markwise"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+psycopg2://postgres:password@db:5432/markwise
      - DATABASE_URL_DIRECT=postgresql+psycopg2://postgres:password@db:5432/markwise
      - AUTH_REQUIRED=true
      - AUTH_JWT_SECRET=local_development_secret_do_not_use_in_prod_1234!
      - ADMIN_PASSWORD=adminPassword123!
      - CORS_ORIGINS=http://localhost:3000
      - TRUSTED_HOSTS=localhost,127.0.0.1,backend
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic -c alembic.ini upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_uploads:
